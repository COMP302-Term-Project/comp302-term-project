<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Google ID Token Test Page</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        color: #172033;
        background: #f5f7fb;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 880px;
        margin: 0 auto;
      }

      section {
        margin-bottom: 24px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        border: 1px solid #bcc7d8;
        border-radius: 6px;
        font: inherit;
      }

      button {
        margin-top: 12px;
        padding: 10px 14px;
        border: 0;
        border-radius: 6px;
        background: #1d4ed8;
        color: white;
        font: inherit;
        cursor: pointer;
      }

      pre {
        min-height: 160px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        padding: 16px;
        border: 1px solid #bcc7d8;
        border-radius: 6px;
        background: white;
      }

      .hint {
        color: #46556f;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Google ID Token Test Page</h1>

      <section class="hint">
        <p>Use this page only for local demo/testing. Add this origin in Google Cloud Console for your OAuth Client ID: <strong>http://localhost:8000</strong></p>
        <p>After sign-in, copy the printed credential and send it to <code>POST /auth/google-login</code> as <code>credential</code>.</p>
      </section>

      <section>
        <label for="client-id">Google OAuth Client ID</label>
        <input id="client-id" placeholder="Paste GOOGLE_CLIENT_ID here">
        <button type="button" id="render-button">Render Google Sign-In</button>
      </section>

      <section>
        <div id="google-button"></div>
      </section>

      <section>
        <label for="token-output">Google credential / ID token</label>
        <pre id="token-output">Sign in to print a token here.</pre>
      </section>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      function showToken(response) {
        document.getElementById("token-output").textContent = response.credential || "No credential returned.";
      }

      function renderGoogleButton() {
        var clientId = document.getElementById("client-id").value.trim();
        var buttonContainer = document.getElementById("google-button");

        if (!clientId) {
          document.getElementById("token-output").textContent = "Paste GOOGLE_CLIENT_ID first.";
          return;
        }

        if (!window.google || !window.google.accounts || !window.google.accounts.id) {
          document.getElementById("token-output").textContent = "Google Identity Services has not loaded yet. Try again in a second.";
          return;
        }

        buttonContainer.innerHTML = "";
        window.google.accounts.id.initialize({
          client_id: clientId,
          callback: showToken
        });
        window.google.accounts.id.renderButton(buttonContainer, {
          type: "standard",
          theme: "outline",
          size: "large",
          text: "signin_with",
          shape: "rectangular"
        });
      }

      document.getElementById("render-button").addEventListener("click", renderGoogleButton);
    </script>
  </body>
</html>
